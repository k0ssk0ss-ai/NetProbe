name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

    - name: Download Go modules
      run: go mod tidy

    - name: Install Fyne-Cross
      run: go install github.com/fyne-io/fyne-cross@latest

    - name: Build APK with Fyne-Cross
      run: ~/go/bin/fyne-cross android -app-id com.netprobe.crowdsource -dir cmd/app -name NetProbe Crowdsource
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NetProbe-Android
        path: fyne-cross/bin/android/*.apk
